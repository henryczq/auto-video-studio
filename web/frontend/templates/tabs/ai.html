<div class="card">
    <h2>AI 模型配置</h2>
    <div class="help-panel">
        这里使用 OpenAI-compatible Chat Completions 接口。可以配置多个模型，并选择一个作为"生成错词建议"的启用模型；API Key 会保存在本地 <code>data/ai_models.json</code>。
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>启用模型</label>
            <select id="ai-active-model"></select>
        </div>
        <div class="form-group">
            <label>API 类型</label>
            <select id="ai-api-type">
                <option value="compatible">OpenAI Compatible (Chat Completions)</option>
                <option value="responses">Responses API</option>
                <option value="anthropic-messages">Anthropic Messages</option>
            </select>
        </div>
        <div class="form-group">
            <label>配置名称</label>
            <input type="text" id="ai-name" placeholder="例如 DeepSeek / OpenAI / Ollama">
        </div>
        <div class="form-group">
            <label>模型名</label>
            <input type="text" id="ai-model" placeholder="例如 deepseek-chat / gpt-4.1-mini">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="ai-base-url" placeholder="例如 https://api.openai.com/v1">
        </div>
        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="ai-api-key" placeholder="本地保存，请注意保护">
        </div>
    </div>
    <div class="action-buttons" style="margin-bottom: 15px;">
        <button class="btn btn-secondary" id="ai-new-model-btn">新建模型</button>
        <button class="btn btn-primary" id="ai-save-model-btn">新增/更新模型</button>
        <button class="btn btn-success" id="ai-test-model-btn">测试当前模型</button>
        <button class="btn btn-danger" id="ai-delete-model-btn">删除当前模型</button>
    </div>
    <div style="margin-bottom: 18px;">
        <h3 style="font-size: 16px; color: #666; margin-bottom: 8px;">已配置模型</h3>
        <table id="ai-models-table">
            <thead>
                <tr>
                    <th>启用</th>
                    <th>API类型</th>
                    <th>配置名称</th>
                    <th>模型名</th>
                    <th>Base URL</th>
                    <th>Key</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="form-group">
        <label>错词检测提示词</label>
        <textarea id="ai-prompt"></textarea>
    </div>
    <div class="form-group">
        <label>TTS 朗读分段提示词</label>
        <textarea id="ai-tts-segment-prompt"></textarea>
    </div>
    <div class="action-buttons">
        <button class="btn btn-success" id="ai-save-config-btn">保存 AI 配置</button>
    </div>
    <div id="ai-config-result" style="margin-top: 15px;"></div>
</div>
<div class="card">
    <h2>AI 请求日志</h2>
    <div class="action-buttons">
        <button class="btn btn-secondary" id="ai-refresh-logs-btn">刷新日志</button>
    </div>
    <table id="ai-logs-table">
        <thead>
            <tr>
                <th>时间</th>
                <th>类型</th>
                <th>状态</th>
                <th>模型</th>
                <th>耗时</th>
                <th>预览/错误</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="ai-log-detail" class="log-viewer" style="margin-top: 15px; display: none;"></div>
</div>
