        <div id="tab-jobs" class="tab-content active">
            <div class="card">
                <h2>上传新视频</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label>任务名称</label>
                        <input type="text" id="job-name" placeholder="例如：飞书 Agent 演示 90 秒">
                    </div>
                    <div class="form-group">
                        <label>选择视频文件</label>
                        <input type="file" id="video-file" accept="video/*,.mp4,.m4v,.mov,.webm,.mkv,.avi,.flv,.wmv,.ts,.mts,.m2ts" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>上传时裁剪开始时间</label>
                            <input type="text" id="job-clip-start" placeholder="可选，例如 0:40">
                        </div>
                        <div class="form-group">
                            <label>上传时裁剪结束时间</label>
                            <input type="text" id="job-clip-end" placeholder="可选，例如 2:10">
                        </div>
                    </div>
                    <div class="field-note">不填则使用整段原视频；填写后会先裁出这一段，再进入后续视频处理和字幕编辑流程。支持 `mm:ss`、`hh:mm:ss` 或秒数。</div>
                    <button type="submit" class="btn btn-primary" id="upload-job-btn">上传并创建任务</button>
                    <div id="upload-job-result" style="margin-top:15px;"></div>
                </form>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; border: none; padding: 0;">现有任务</h2>
                    <div>
                        <select id="job-filter" style="padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="all">全部</option>
                            <option value="completed">已完成</option>
                            <option value="processing">处理中</option>
                            <option value="pending">待处理</option>
                            <option value="error">失败</option>
                        </select>
                    </div>
                </div>
                <div id="job-list" class="job-list"></div>
            </div>
        </div>

        <!-- 发布弹框 -->
        <div id="publish-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000;">
            <div style="position:relative; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:30px; border-radius:8px; max-width:600px; width:90%; max-height:85vh; overflow-y:auto;">
                <h3 style="margin-top:0; margin-bottom:20px;">发布视频到平台</h3>

                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">任务名称</label>
                    <div id="publish-modal-job-name" style="padding:8px 12px; background:#f5f5f5; border-radius:4px;"></div>
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">视频版本</label>
                    <select id="publish-modal-video-type" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px;">
                        <option value="final_replace_audio_subtitled" selected>TTS与合成-带配音+字幕</option>
                        <option value="final_replace_audio">最终版（带配音+字幕）</option>
                        <option value="final_subtitles_video">原声字幕版</option>
                        <option value="processed">原处理视频</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">发布平台</label>
                    <select id="publish-modal-platform-select" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px;">
                        <option value="">请选择平台</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">标题</label>
                    <input type="text" id="publish-modal-title" placeholder="视频标题" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px;">
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">简介</label>
                    <textarea id="publish-modal-desc" placeholder="视频简介" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px; min-height:60px;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">标签（逗号分隔）</label>
                    <input type="text" id="publish-modal-tags" placeholder="标签1,标签2,标签3" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px;">
                </div>

                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                    <button class="btn btn-secondary" id="publish-modal-cancel-btn">取消</button>
                    <button class="btn btn-success" id="publish-modal-confirm-btn">发布</button>
                </div>
            </div>
        </div>
